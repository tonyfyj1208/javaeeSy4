<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title th:text="${user != null} ? '修改用户' : '添加用户'"></title>
    <link rel="stylesheet" th:href="@{/static/css/style.css}" />
</head>
<body>
    <div class="navbar">
        <span class="brand">设备资产管理系统</span>
        <div class="nav-right">
            <span th:text="'管理员, ' + ${session.loginUser.name}"></span>
            <a th:href="@{/admin/users}">用户管理</a>
            <a th:href="@{/user/logout}">退出</a>
        </div>
    </div>
    <div class="container">
        <div class="card" style="max-width:500px;">
            <h3 th:text="${user != null} ? '修改用户' : '添加用户'"></h3>
            <form th:action="${user != null} ? @{/admin/user/edit} : @{/admin/user/add}" method="post">
                <input type="hidden" name="id" th:value="${user?.id}" />
                <div class="form-group">
                    <label>登录名</label>
                    <input type="text" name="loginName" th:value="${user?.loginName}"
                           th:disabled="${user != null}" required />
                </div>
                <div class="form-group" th:if="${user == null}">
                    <label>密码</label>
                    <input type="password" name="password" required />
                </div>
                <div class="form-group">
                    <label>姓名</label>
                    <input type="text" name="name" th:value="${user?.name}" required />
                </div>
                <div class="form-group">
                    <label>电话</label>
                    <input type="text" name="phone" th:value="${user?.phone}" />
                </div>
                <div class="form-group">
                    <label>邮箱</label>
                    <input type="email" name="email" th:value="${user?.email}" />
                </div>
                <div class="form-group" th:if="${user == null}">
                    <label>类型</label>
                    <select name="type">
                        <option value="1">普通用户</option>
                        <option value="0">管理员</option>
                    </select>
                </div>
                <button class="btn" type="submit" th:text="${user != null} ? '保存' : '添加'"></button>
                <a class="btn" th:href="@{/admin/users}">返回</a>
            </form>
        </div>
    </div>
</body>
</html>
