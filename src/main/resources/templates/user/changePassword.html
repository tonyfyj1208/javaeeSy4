<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>修改密码</title>
    <link rel="stylesheet" th:href="@{/static/css/style.css}" />
</head>
<body>
    <div class="navbar">
        <span class="brand">设备资产管理系统</span>
        <div class="nav-right">
            <span th:text="'欢迎, ' + ${session.loginUser.name}"></span>
            <a th:href="@{/user/home}">我的设备</a>
            <a th:href="@{/user/logout}">退出</a>
        </div>
    </div>
    <div class="container">
        <div class="card" style="max-width:500px;">
            <h3>修改密码</h3>
            <div th:if="${msg != null}" th:text="${msg}"
                 th:class="${msg == '密码修改成功'} ? 'msg-success' : 'msg-error'"></div>
            <form th:action="@{/user/changePassword}" method="post">
                <div class="form-group">
                    <label>原密码</label>
                    <input type="password" name="oldPassword" required />
                </div>
                <div class="form-group">
                    <label>新密码</label>
                    <input type="password" name="newPassword" required />
                </div>
                <button class="btn" type="submit">修改</button>
                <a class="btn" th:href="@{/user/home}">返回</a>
            </form>
        </div>
    </div>
</body>
</html>
