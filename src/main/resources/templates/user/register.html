<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>注册 - 设备资产管理系统</title>
    <link rel="stylesheet" th:href="@{/static/css/style.css}" />
</head>
<body class="login-page">
    <div class="login-card">
        <h2>用户注册</h2>
        <p class="sub">创建一个新账号</p>
        <form th:action="@{/user/register}" method="post">
            <div class="form-group">
                <label>登录名</label>
                <input type="text" name="loginName" placeholder="用于登录的用户名" required />
            </div>
            <div class="form-group">
                <label>密码</label>
                <input type="password" name="password" placeholder="请设置密码" required />
            </div>
            <div class="form-group">
                <label>姓名</label>
                <input type="text" name="name" placeholder="真实姓名" required />
            </div>
            <div class="form-group">
                <label>电话</label>
                <input type="text" name="phone" placeholder="手机号码" />
            </div>
            <div class="form-group">
                <label>邮箱</label>
                <input type="email" name="email" placeholder="电子邮箱" />
            </div>
            <button class="btn" type="submit">注 册</button>
        </form>
        <div class="footer-link">
            <a th:href="@{/user/toLogin}">已有账号？去登录</a>
        </div>
    </div>
</body>
</html>
